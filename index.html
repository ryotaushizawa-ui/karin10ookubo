<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M男転生～女神にM男診断されて女勇者にイかされる～</title>
    <style>
        :root { --primary: #9d50bb; --bg: #0f0c29; --text: #ffffff; --gold: #ffeb3b; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        #game-box { width: 92%; max-width: 480px; background: #1a1a2e; padding: 25px; border: 4px solid var(--primary); text-align: center; box-shadow: 10px 10px 0px #000; position: relative; }
        
        /* ホワイトアウト演出 */
        #white-out { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: none; opacity: 0; transition: opacity 0.8s; pointer-events: none; }
        
        .goddess-content { opacity: 0; display: none; }
        .goddess-visible { opacity: 1 !important; display: block !important; animation: fadeIn 1.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo-img { width: 100%; max-width: 320px; margin-bottom: 25px; }
        .goddess-img { width: 100%; height: auto; border: 2px solid #fff; background: #333; display: block; margin: 0 auto; border-radius: 4px; }
        
        .msg-bubble { background: #fff; color: #000; padding: 20px; border-radius: 12px; margin-top: 25px; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; line-height: 1.6; position: relative; cursor: pointer; border: 3px solid var(--primary); text-align: left; }
        .msg-bubble::after { content: "▼ CLICK TO START"; position: absolute; bottom: 5px; right: 15px; font-size: 0.6rem; color: #9d50bb; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #user-name { padding: 12px; width: 80%; margin-bottom: 20px; border-radius: 5px; border: 2px solid var(--primary); text-align: center; font-size: 1rem; background: #000; color: #fff; }
        .choices { display: grid; gap: 10px; }

        /* --- ボタンのスマホ最適化 --- */
        button { 
            background: #eee; 
            border: none; 
            padding: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #666; 
            font-size: 0.95rem; 
            color: #000; 
            transition: 0.1s; 
            width: 100%; 
            text-align: left; 
            -webkit-tap-highlight-color: transparent; /* スマホのタップ青枠消し */
        }

        /* PC環境のみホバーを有効にする */
        @media (hover: hover) {
            button:hover { background: var(--gold); transform: translate(2px, 2px); box-shadow: 2px 2px 0px #666; }
        }

        /* スマホ・PC共通：押した瞬間だけ黄色くする */
        button:active { 
            background: var(--gold) !important; 
            transform: translate(2px, 2px); 
            box-shadow: 2px 2px 0px #666; 
        }

        .hidden { display: none !important; }
        .job-res { font-size: 1.8rem; color: var(--gold); text-shadow: 2px 2px #000; margin: 10px 0; font-weight: bold; }
        .stats { text-align: left; background: #000; padding: 15px; border: 1px dashed var(--gold); font-size: 0.85rem; line-height: 1.6; }
        footer { margin-top: 30px; color: #666; font-size: 0.75rem; text-align: center; }
    </style>
</head>
<body>

<div id="white-out"></div>

<div id="game-box">
    <div id="title-screen">
        <img src="logo.png" class="logo-img" alt="M男転生 ロゴ">
        <p style="color: #aaa; font-size: 0.8rem;">～女神にM男診断されて女勇者にイかされる～</p>
        <button onclick="goToNameInput()" style="text-align:center;">異世界へ転生する</button>
    </div>

    <div id="name-input-screen" class="hidden">
        <h3 style="color: var(--gold);">転生前の名前を教えて？</h3>
        <input type="text" id="user-name" placeholder="名前を入力..." maxlength="15">
        <button onclick="startNovel()" style="text-align:center;">この名前で転生を開始</button>
    </div>

    <div id="novel-screen" class="hidden">
        <div id="novel-text" style="min-height:150px; display:flex; align-items:center; justify-content:center; line-height:1.8; padding: 0 10px;"></div>
        <button onclick="nextNovel()" id="btn-next" style="width:auto; padding:10px 40px; margin-top:20px; text-align:center;">次へ</button>
    </div>

    <div id="goddess-wrap" class="goddess-content">
        <div style="background: #fff; padding: 15px; border-radius: 8px;">
            <img src="megami.jpg" class="goddess-img" alt="女神画像">
            <div id="goddess-comment" class="msg-bubble" onclick="startQuiz()"></div>
        </div>

        <div id="quiz" class="hidden" style="margin-top: 20px;">
            <div id="q-num" style="color:var(--gold); font-size:0.8rem; margin-bottom:10px; font-weight:bold;"></div>
            <div id="q-text" style="margin-bottom: 20px; font-weight: bold; font-size: 1rem; text-align:left;"></div>
            <div class="choices" id="choices"></div>
        </div>
    </div>

    <div id="result" class="hidden">
        <div style="font-weight:bold; font-size:0.9rem;">鑑定結果：<span id="res-name-label"></span>のジョブは…</div>
        <div class="job-res" id="job-name"></div>
        <div class="stats" id="detail"></div>
        <button id="btn-share" style="background:#000; color:#fff; margin-top:15px; text-align:center;">結果をXで報告</button>
        <button onclick="location.reload()" style="margin-top:10px; background:#999; text-align:center;">タイトルへ</button>
    </div>
</div>

<footer>
    かりんと大久保・新大久保店presents<br>M男転生project
</footer>

<script>
    let userName = "";
    let currentQ = 0;
    let scores = {};
    let novelIndex = 0;

    const jobs = {
        fenrir: { n: "高貴なる処刑犬（フェンリル）", s: "神話級の従順、黄金の鎖", i: "魔力封じの枷", o: "全身拘束、遠吠え、マズル", c: "伝説の幻獣なのに、中身は普通の犬よりずっと高潔で、それでいて救いようのないドMだなんて……ギャップが凄まじいわね。" },
        sage: { n: "深淵の探求賢者（セージ）", s: "絶頂魔法、自己犠牲儀式", i: "特注の緊縛ロープ", o: "放置、目隠し、徹底した責め", c: "魔法の才能が突き抜けてると思ったら、こだわりが強すぎる「こじらせドM」じゃない！理屈を並べて理想のプレイを要求するなんて、一番厄介ね。" },
        alchemist: { n: "実験体錬金術師", s: "劇薬耐性(快感)", i: "怪しい薬の試験管", o: "ハッピーセット", c: "女勇者の作る怪しいポーションを喜んで飲み干す姿……立派な変態ね。" },
        dog: { n: "勇者のペット（犬）", s: "お手・おかわり", i: "トゲ付きの首輪", o: "Mセット", c: "人間をやめて犬として生きる道を選んだのね。四つん這いで這いつくばりなさい！" },
        floor: { n: "高機能な床", s: "踏まれ心地の追求", i: "高級なワックス", o: "踏みつけ", c: "もはや生物ですらないわ。女勇者に踏まれるためだけの「床」がお似合いよ。" },
        knight: { n: "屈辱の騎士", s: "プライド崩壊", i: "ボロボロの家紋旗", o: "顔面騎乗", c: "高潔な騎士が女勇者に完敗して跪く……そのギャップがたまらないんでしょ？" },
        mage: { n: "絶望の魔法使い", s: "魔力搾取(快感)", i: "童貞の証（賢者の杖）", o: "匂いかぎ、魔力抽出", c: "童貞を極めて魔法が使えるようになったのに、結局女勇者に魔力を搾り取られるだけの存在ね。一生彼女の魔力タンクとして尽くしなさい。" },
        slime: { n: "ドMスライム", s: "全身粘液、核(コア)露出", i: "勇者の靴磨きセット", o: "指アナル（前立腺刺激）", c: "物理的な痛みには鈍感だけど、体内の『核（コア）』を直接いじられると、抗えない快感に溶けちゃうのね。女勇者に指先でかき回されるのが一番の幸せなんでしょ？" },
        shield: { n: "人間盾", s: "ダメージ全吸収", i: "ボロボロの鉄板", o: "拘束、乳首舐め", c: "攻撃を避けるなんて言語道断。すべての苦痛を正面から受け止めるのがアンタの運命よ。" },
        slave: { n: "終身刑の奴隷", s: "絶対服従", i: "外れない鉄枷", o: "ビンタ、蹴り、目隠し、拘束", c: "名前すら奪われて、ただの番号で呼ばれる快感。一生彼女の所有物ね。" }
    };

    const qs = [
        { q: "女勇者に「今日から人間禁止。犬になりなさい」と言われたら？", a: [
            {t: "「ワン！」と即座に吠えて、尻尾を振る", j: "dog"},
            {t: "「私は神に仕える獣。ですが貴女には屈しましょう」と跪く", j: "fenrir"},
            {t: "言葉を失い、屈辱に震えながら彼女の靴を見つめる", j: "knight"},
            {t: "「犬としての適切な管理プロセスを教えてください」と聞く", j: "sage"}
        ]},
        { q: "パーティの休憩中、女勇者が椅子に座ろうとしています。あなたの行動は？", a: [
            {t: "無言で床になり、彼女に踏まれる面積を最大化する", j: "floor"},
            {t: "「ここの角度が最も座り心地が良いはずです」と理論的に椅子になる", j: "sage"},
            {t: "彼女の足元で、スライムのように靴の汚れを気にし始める", j: "slime"},
            {t: "盾を敷き、その上で自分もろとも踏まれるのを待つ", j: "shield"}
        ]},
        { q: "女勇者が「新しい毒薬の実験台が必要だ」と言い出しました。", a: [
            {t: "「もっと強いのをください！」と、理性を捨てて飲み干す", j: "alchemist"},
            {t: "震えながら「これも騎士の修行……」と自分に言い聞かせて飲む", j: "knight"},
            {t: "毒の影響で身体が溶け、彼女の足元に広がる自分を想像する", j: "slime"},
            {t: "鎖で繋がれたまま、拒否権がないことに安心しながら飲む", j: "slave"}
        ]},
        { q: "敵の強力な魔法が放たれました。あなたの「理想」の守り方は？", a: [
            {t: "鉄板のように硬直して、彼女への衝撃をゼロにする", j: "shield"},
            {t: "魔力と尊厳を吸い取られながら、魔法障壁を張る", j: "mage"},
            {t: "彼女の前に跪き、守護獣としての意地を見せつつ蹂躙される", j: "fenrir"},
            {t: "魔法の威力を分析し、最も苦痛が長く続く受け方を提案する", j: "sage"}
        ]},
        { q: "街の人々に、彼女の「所有物」として紹介された時の気分は？", a: [
            {t: "「自分には名前などない、ただの番号だ」と復唱する", j: "slave"},
            {t: "周囲の冷たい視線を浴びながら、首輪を引かれて悦に浸る", j: "dog"},
            {t: "かつての部下に目撃され、絶望しながら命令に従う", j: "knight"},
            {t: "「この主従の美学を誰も理解できないだろう」と悦に入る", j: "sage"}
        ]},
        { q: "女勇者に一生外れない「鉄枷（てつかせ）」をはめられることに。", a: [
            {t: "「重い……最高だ……」と、その不自由さに涙を流す", j: "slave"},
            {t: "「神話の狼を繋ぎ止めるとは、素晴らしい力だ」と称賛する", j: "fenrir"},
            {t: "その枷の構造を観察し、より食い込む方法を自ら進言する", j: "sage"},
            {t: "枷をはめられたまま、床として機能し続ける自分を誇る", j: "floor"}
        ]},
        { q: "戦いの後、彼女の靴が泥で汚れています。どうしますか？", a: [
            {t: "スライムとして、核（コア）を刺激されるのを期待しつつ汚れを溶かす", j: "slime"},
            {t: "床として横たわり、泥を落としやすい「質感」を提供する", j: "floor"},
            {t: "「分析の結果、私の舌で拭うのが最適です」と主張する", j: "sage"},
            {t: "犬のように這いつくばり、鼻を鳴らして許可を待つ", j: "dog"}
        ]},
        { q: "あなたが「道具」として扱われる際、最も快感なのは？", a: [
            {t: "「代わりはいくらでもいる」と突き放される瞬間", j: "slime"},
            {t: "「私にしか使えない道具だ」と固執される瞬間", j: "fenrir"},
            {t: "自分の機能を効率的に使われ、理屈にかなった瞬間", j: "sage"},
            {t: "何時間も無言で拘束され、意志を禁じられた瞬間", j: "shield"}
        ]},
        { q: "女勇者の魔力が枯渇しました。救済のために捧げるのは？", a: [
            {t: "「童貞を貫いたこの魔力、すべて吸い取ってください」と捧げる", j: "mage"},
            {t: "「この比率で抽出するのが最も効率的です」と計算して捧げる", j: "sage"},
            {t: "黙って彼女の足首を掴み、生命力を直に流し込む", j: "fenrir"},
            {t: "魔力回復薬を自ら作り、その副作用を全身で受ける", j: "alchemist"}
        ]},
        { q: "最後に確認します。あなたが異世界で「本当に」なりたいものは？", a: [
            {t: "名前も言葉も持たない、完璧な「物（オブジェ）」", j: "floor"},
            {t: "知性を持ったまま、命令という鎖に縛られる「囚われの魂」", j: "fenrir"},
            {t: "いつでも八つ当たりできる、頑丈な「ゴミ箱」", j: "shield"},
            {t: "主人の足元を清潔に保ち、影のように付き従う「獣」", j: "dog"}
        ]}
    ];

    function goToNameInput() {
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('name-input-screen').classList.remove('hidden');
    }

    function startNovel() {
        userName = document.getElementById('user-name').value || "名無し";
        document.getElementById('name-input-screen').classList.add('hidden');
        document.getElementById('novel-screen').classList.remove('hidden');
        showNextSentence();
    }

    function showNextSentence() {
        const scenario = [
            `俺の名前は、${userName}。`,
            "ごく普通の、どこにでもある平凡な毎日を送る男だ。",
            "だが、ふと見上げた夜空に、見たこともない色の星が流れた気がした。",
            "「……ん？」",
            "背後から、不自然なほどの熱風と、凄まじい轟音が迫る。",
            "振り返ると、そこには視界を埋め尽くすほどの光が――"
        ];
        if (novelIndex < scenario.length) {
            document.getElementById('novel-text').innerText = scenario[novelIndex];
            novelIndex++;
        } else {
            transitionToGoddess();
        }
    }
    function nextNovel() { showNextSentence(); }

    function transitionToGoddess() {
        const whiteOut = document.getElementById('white-out');
        const novelScreen = document.getElementById('novel-screen');
        const goddessWrap = document.getElementById('goddess-wrap');
        const commentBox = document.getElementById('goddess-comment');

        whiteOut.style.display = 'block';
        setTimeout(() => { whiteOut.style.opacity = '1'; }, 20);

        setTimeout(() => {
            novelScreen.classList.add('hidden');
            goddessWrap.classList.add('goddess-visible');
            
            // 女神様のセリフ修正
            commentBox.innerText = `ひどい事故だったわね、${userName}。ここにいるということはアンタはMの素質を見抜かれて、転生者に選ばれたのね。最近地球で人気な異世界転生モノ？のせいで転生者が絶えないからM男に転生してもらうわ。さぁ診断を始めましょう。`;
            commentBox.classList.remove('hidden');

            setTimeout(() => {
                whiteOut.style.opacity = '0';
                setTimeout(() => { whiteOut.style.display = 'none'; }, 800);
            }, 500);
        }, 1000);
    }

    function startQuiz() {
        document.getElementById('goddess-comment').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        Object.keys(jobs).forEach(j => scores[j] = 0);
        showQ();
    }

    function showQ() {
        if(currentQ < qs.length) {
            document.getElementById('q-num').innerText = `STEP ${currentQ + 1} / 10`;
            document.getElementById('q-text').innerText = qs[currentQ].q;
            const div = document.getElementById('choices');
            div.innerHTML = '';
            qs[currentQ].a.forEach(ans => {
                const btn = document.createElement('button');
                btn.innerText = ans.t;
                btn.onclick = () => { scores[ans.j]++; currentQ++; showQ(); };
                div.appendChild(btn);
            });
        } else { showResult(); }
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const commentBox = document.getElementById('goddess-comment');
        
        let maxJob = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const job = jobs[maxJob];
        document.getElementById('res-name-label').innerText = userName;
        document.getElementById('job-name').innerText = job.n;
        
        if (maxJob === 'fenrir') {
            commentBox.innerText = "「ちょ、ちょっと待って！ 伝説のフェンリルを引き当てるなんて……。しかも、普通の犬より扱いが面倒そうなドMじゃない！ アンタ、とんでもない素質を隠してたわね……」";
        } else if (maxJob === 'sage') {
            commentBox.innerText = "「賢者……？ いえ、これ『こじらせドM賢者』じゃない！ 知識を全部そっちの方向に使うなんて天才ね。女勇者も困惑するレベルのこだわりよ……」";
        } else {
            commentBox.innerText = `鑑定完了！アンタの転生先は、この「${job.n}」よ。存分に可愛がってもらいなさい。`;
        }
        commentBox.classList.remove('hidden');

        document.getElementById('detail').innerHTML = `
            <strong>女神の評価：</strong> ${job.c}<br><br>
            <strong>能力：</strong> ${job.s} / <strong>装備：</strong> ${job.i}<br>
            <div style="margin-top:10px; padding:8px; background:#222; border-left:4px solid #f00; color:#ff8888;">♥おすすめ：${job.o}</div>
        `;
        
        document.getElementById('btn-share').onclick = () => {
            const text = encodeURIComponent(`【M男転生診断】\n私の転生ジョブは「${job.n}」！\n#M男転生診断 #異世界転生`);
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(window.location.href)}`, '_blank');
        };
    }
</script>
</body>
</html>
